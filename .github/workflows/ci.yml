name: CI

# Kompilacja na każdy push / PR (HUS-52). Czerwony status = błąd kompilacji.
# Login = Java 8 (NIE 21 — to jest serwer logowania). Docker push/release robi release.yaml (na tag).
on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build login.jar (JDK 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Build with Gradle (jar)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.0.2'
          arguments: jar --no-daemon

      - name: Upload login.jar
        uses: actions/upload-artifact@v4
        with:
          name: login-jar
          path: build/libs/login.jar
          if-no-files-found: error
